<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #48bb78;
            --danger: #f56565;
            --warning: #ed8936;
            --dark: #1a202c;
            --light: #f7fafc;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .search-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-section input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-section input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-section button {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-section button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .search-section button:active {
            transform: translateY(0);
        }

        .loading {
            text-align: center;
            color: white;
            padding: 30px;
            font-size: 1.2rem;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: var(--danger);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error i {
            font-size: 1.5rem;
        }

        .current-weather {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .current-weather {
                grid-template-columns: 1fr;
            }
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .weather-icon {
            font-size: 5rem;
            color: var(--primary);
        }

        .weather-info h2 {
            font-size: 1.2rem;
            color: var(--dark);
            margin-bottom: 10px;
            text-transform: capitalize;
        }

        .temperature {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .location {
            font-size: 1.1rem;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .date-time {
            font-size: 0.9rem;
            color: #718096;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .detail-item {
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .detail-label {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark);
        }

        .forecast-section {
            margin-bottom: 30px;
        }

        .forecast-section h3 {
            color: white;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .forecast-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .forecast-date {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 2.5rem;
            color: var(--primary);
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .forecast-desc {
            font-size: 0.85rem;
            color: #718096;
            text-transform: capitalize;
        }

        .hidden {
            display: none;
        }

        .alerts {
            background: var(--warning);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alerts i {
            font-size: 1.3rem;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0.8;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--primary);
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <p>Real-time weather information for any location</p>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Enter city name..." autocomplete="off">
            <button onclick="searchWeather()"><i class="fas fa-search"></i> Search</button>
            <button onclick="getCurrentLocation()" style="background: linear-gradient(135deg, var(--success), #38a169);"><i class="fas fa-location-dot"></i> Current Location</button>
        </div>

        <div id="alertsContainer"></div>
        <div id="errorContainer"></div>

        <div id="loadingContainer" class="loading hidden">
            <div class="spinner"></div> Fetching weather data...
        </div>

        <div id="weatherContainer" class="hidden">
            <!-- Current Weather Section -->
            <div class="current-weather">
                <div class="weather-main">
                    <div class="weather-icon" id="weatherIcon"></div>
                    <div class="weather-info">
                        <div class="location" id="locationName"></div>
                        <div class="date-time" id="dateTime"></div>
                        <div class="temperature" id="temperature"></div>
                        <h2 id="weatherDesc"></h2>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <div class="detail-label"><i class="fas fa-droplet"></i> Humidity</div>
                        <div class="detail-value" id="humidity"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label"><i class="fas fa-wind"></i> Wind Speed</div>
                        <div class="detail-value" id="windSpeed"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label"><i class="fas fa-gauge"></i> Pressure</div>
                        <div class="detail-value" id="pressure"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label"><i class="fas fa-eye"></i> Visibility</div>
                        <div class="detail-value" id="visibility"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label"><i class="fas fa-arrow-up"></i> Feels Like</div>
                        <div class="detail-value" id="feelsLike"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label"><i class="fas fa-arrow-down"></i> UV Index</div>
                        <div class="detail-value" id="uvIndex"></div>
                    </div>
                </div>
            </div>

            <!-- Forecast Section -->
            <div class="forecast-section">
                <h3><i class="fas fa-calendar-days"></i> 5-Day Forecast</h3>
                <div class="forecast-grid" id="forecastContainer"></div>
            </div>
        </div>

        <footer>
            <p>Data provided by Open-Meteo API | Temperature in Celsius | Last Updated: <span id="lastUpdate"></span></p>
        </footer>
    </div>

    <script>
        const API_BASE = 'https://api.open-meteo.com/v1/forecast';
        const GEO_API = 'https://geocoding-api.open-meteo.com/v1/search';

        let currentLat = null;
        let currentLon = null;

        // Weather icon mapping
        const weatherIcons = {
            0: '<i class="fas fa-sun"></i>',
            1: '<i class="fas fa-cloud-sun"></i>',
            2: '<i class="fas fa-cloud"></i>',
            3: '<i class="fas fa-cloud"></i>',
            45: '<i class="fas fa-wind"></i>',
            48: '<i class="fas fa-wind"></i>',
            51: '<i class="fas fa-cloud-rain"></i>',
            53: '<i class="fas fa-cloud-rain"></i>',
            55: '<i class="fas fa-cloud-rain"></i>',
            61: '<i class="fas fa-cloud-rain"></i>',
            63: '<i class="fas fa-cloud-rain"></i>',
            65: '<i class="fas fa-cloud-rain"></i>',
            71: '<i class="fas fa-snowflake"></i>',
            73: '<i class="fas fa-snowflake"></i>',
            75: '<i class="fas fa-snowflake"></i>',
            77: '<i class="fas fa-snowflake"></i>',
            80: '<i class="fas fa-cloud-rain"></i>',
            81: '<i class="fas fa-cloud-rain"></i>',
            82: '<i class="fas fa-cloud-rain"></i>',
            85: '<i class="fas fa-snowflake"></i>',
            86: '<i class="fas fa-snowflake"></i>',
            95: '<i class="fas fa-bolt"></i>',
            96: '<i class="fas fa-bolt"></i>',
            99: '<i class="fas fa-bolt"></i>'
        };

        const weatherCodes = {
            0: 'Clear sky',
            1: 'Mainly clear',
            2: 'Partly cloudy',
            3: 'Overcast',
            45: 'Foggy',
            48: 'Depositing rime fog',
            51: 'Light drizzle',
            53: 'Moderate drizzle',
            55: 'Dense drizzle',
            61: 'Slight rain',
            63: 'Moderate rain',
            65: 'Heavy rain',
            71: 'Slight snow',
            73: 'Moderate snow',
            75: 'Heavy snow',
            77: 'Snow grains',
            80: 'Slight rain showers',
            81: 'Moderate rain showers',
            82: 'Violent rain showers',
            85: 'Slight snow showers',
            86: 'Heavy snow showers',
            95: 'Thunderstorm',
            96: 'Thunderstorm with slight hail',
            99: 'Thunderstorm with heavy hail'
        };

        async function searchWeather() {
            const city = document.getElementById('searchInput').value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }

            try {
                showLoading(true);
                const response = await fetch(`${GEO_API}?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
                const data = await response.json();

                if (!data.results || data.results.length === 0) {
                    showError('City not found. Please try another name.');
                    return;
                }

                const location = data.results[0];
                currentLat = location.latitude;
                currentLon = location.longitude;
                
                await fetchWeatherData(location.name, location.country);
            } catch (error) {
                showError('Error searching for city: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function getCurrentLocation() {
            if (!navigator.geolocation) {
                showError('Geolocation is not supported by your browser');
                return;
            }

            showLoading(true);
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    currentLat = position.coords.latitude;
                    currentLon = position.coords.longitude;

                    try {
                        const response = await fetch(`${GEO_API}?latitude=${currentLat}&longitude=${currentLon}&format=json`);
                        const data = await response.json();
                        const location = data.results[0];
                        await fetchWeatherData(location.name, location.country);
                    } catch (error) {
                        showError('Error fetching location name: ' + error.message);
                    } finally {
                        showLoading(false);
                    }
                },
                (error) => {
                    showLoading(false);
                    showError('Error getting your location: ' + error.message);
                }
            );
        }

        async function fetchWeatherData(cityName, country) {
            try {
                showLoading(true);
                const params = new URLSearchParams({
                    latitude: currentLat,
                    longitude: currentLon,
                    current: 'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,pressure_msl,visibility',
                    daily: 'weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code',
                    timezone: 'auto',
                    forecast_days: 5
                });

                const response = await fetch(`${API_BASE}?${params}`);
                const data = await response.json();

                if (!data || !data.current) {
                    showError('Failed to fetch weather data');
                    return;
                }

                displayWeather(data, cityName, country);
            } catch (error) {
                showError('Error fetching weather data: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function displayWeather(data, cityName, country) {
            const current = data.current;
            const daily = data.daily;

            // Update location
            document.getElementById('locationName').textContent = `${cityName}, ${country}`;
            document.getElementById('dateTime').textContent = new Date().toLocaleString();

            // Update current weather
            document.getElementById('temperature').textContent = `${Math.round(current.temperature_2m)}°C`;
            document.getElementById('weatherIcon').innerHTML = weatherIcons[current.weather_code] || '<i class="fas fa-cloud"></i>';
            document.getElementById('weatherDesc').textContent = weatherCodes[current.weather_code] || 'Unknown';

            // Update details
            document.getElementById('humidity').textContent = `${current.relative_humidity_2m}%`;
            document.getElementById('windSpeed').textContent = `${current.wind_speed_10m} km/h`;
            document.getElementById('pressure').textContent = `${current.pressure_msl} hPa`;
            document.getElementById('visibility').textContent = `${(current.visibility / 1000).toFixed(1)} km`;
            document.getElementById('feelsLike').textContent = `${Math.round(current.apparent_temperature)}°C`;
            document.getElementById('uvIndex').textContent = 'N/A';

            // Update forecast
            const forecastContainer = document.getElementById('forecastContainer');
            forecastContainer.innerHTML = '';

            for (let i = 0; i < daily.time.length; i++) {
                const date = new Date(daily.time[i]);
                const card = document.createElement('div');
                card.className = 'forecast-card';
                card.innerHTML = `
                    <div class="forecast-date">${date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
                    <div class="forecast-icon">${weatherIcons[daily.weather_code[i]] || '<i class="fas fa-cloud"></i>'}</div>
                    <div class="forecast-temp">${Math.round(daily.temperature_2m_max[i])}° / ${Math.round(daily.temperature_2m_min[i])}°</div>
                    <div class="forecast-desc">${weatherCodes[daily.weather_code[i]]}</div>
                `;
                forecastContainer.appendChild(card);
            }

            // Update last update time
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

            // Show weather container
            document.getElementById('weatherContainer').classList.remove('hidden');
            clearError();
        }

        function showLoading(show) {
            document.getElementById('loadingContainer').classList.toggle('hidden', !show);
        }

        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error"><i class="fas fa-exclamation-circle"></i> ${message}</div>`;
        }

        function clearError() {
            document.getElementById('errorContainer').innerHTML = '';
        }

        // Search on Enter key
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Load default city on page load
        window.addEventListener('load', () => {
            document.getElementById('searchInput').value = 'Jakarta';
            searchWeather();
        });
    </script>
</body>
</html>
